services:
  app:
    image: gradle:jdk25
    working_dir: /app
    volumes:
      - .:/app
      - gradle_cache:/home/gradle/.gradle
    ports:
      - "8080:3000"
    container_name: hotel
    environment:
      HOTEL_MONGO_URI: mongodb://mongo:27017/hotel_db
    depends_on:
      - mongo
    networks:
      - backend
    command: gradle bootRun

  mongo:
    image: mongo:7
    container_name: mongodbForHotel
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginxForHotel
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - backend

volumes:
  mongo_data:
  gradle_cache:

networks:
  backend:
    driver: bridge